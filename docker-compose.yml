# ============================================================
# Razkindo2 ERP - Docker Compose (CasaOS Compatible)
# Next.js 16 + Prisma + Supabase PostgreSQL
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Untuk device storage kecil, uncomment baris ini:
      # no_cache: true
    container_name: razkindo2-erp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  uploads-data:
    driver: local
