# ============================================================
# Razkindo2 ERP - Docker Compose (CasaOS Compatible)
# ============================================================
#
# CARA 1: Pre-built image (RECOMMENDED untuk storage kecil)
#   Tidak perlu build di device, cukup pull image dari GitHub
#   Image sudah di-build oleh GitHub Actions
#
# CARA 2: Build lokal menggunakan build.sh
#   ./build.sh
#   docker compose up -d
#
# CARA 3: Build langsung (butuh storage ~2GB)
#   docker compose up -d --build
# ============================================================

services:
  app:
    # ---- CARA 1: Pre-built image (RECOMMENDED) ----
    image: ghcr.io/henryarthanto/razkindo2-erp:latest

    # ---- CARA 2 & 3: Build lokal (uncomment jika build sendiri) ----
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: razkindo2-erp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  uploads-data:
    driver: local
