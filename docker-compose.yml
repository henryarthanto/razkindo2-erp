# ============================================================
# Razkindo2 ERP - Docker Compose
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: razkindo2-erp:latest
    container_name: razkindo2-erp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
